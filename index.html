<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>FaceSlime</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    #camerafeed { width: 100%; height: 100%; display: block; }
    .overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: rgba(0, 0, 0, 0.85); color: #fff;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px; line-height: 1.8; text-align: left; z-index: 10;
    }
    .overlay[hidden] { display: none; }
    .overlay code {
      background: #222; border: 1px solid #444; border-radius: 3px; padding: 1px 5px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/three-addons/",
        "lottie-web": "./vendor/lottie-web.js"
      }
    }
  </script>
  <!-- ARエンジン（同梱されていない場合は vendor/README.md の手順で配置してください） -->
  <script async src="./vendor/xr.js" data-preload-chunks="face"></script>
  <!-- XRExtras（任意。配置されていれば ローディング画面/エラー表示 に使われます） -->
  <script src="./vendor/xrextras.js"></script>
</head>
<body>
  <canvas id="camerafeed"></canvas>
  <div id="engine-missing" class="overlay" hidden>
    <div>
      <strong>ARエンジン (vendor/xr.js) が見つかりません。</strong><br />
      このバンドルにはライセンス上の理由からARエンジン本体を同梱していません。<br />
      <code>vendor/README.md</code> の手順に従って <code>vendor/xr.js</code> を配置し、
      HTTPSでホストしたうえで再度アクセスしてください。
    </div>
  </div>
  <div id="runtime-error" class="overlay" hidden></div>
  <script>
    // xr.js が読み込まれない場合の案内（配置忘れ・パス誤りの検出）
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (!window.XR8) {
          document.getElementById('engine-missing').hidden = false;
        }
      }, 4000);
    });
  </script>
  <script type="module" src="./runtime/main.js"></script>
</body>
</html>
